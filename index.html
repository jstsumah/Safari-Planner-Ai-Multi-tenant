    <script>
      // Global process polyfill
      window.process = window.process || { env: {} };
      
      // Safety shim for window.fetch to prevent "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        var originalFetch = window.fetch;
        var currentFetch = originalFetch;

        function applyShim(target, name) {
          try {
            var descriptor = Object.getOwnPropertyDescriptor(target, name);
            if (descriptor && descriptor.configurable) {
              Object.defineProperty(target, name, {
                get: function() { return currentFetch; },
                set: function(v) { 
                  console.warn('Redirected assignment to read-only ' + name);
                  currentFetch = v;
                },
                configurable: true,
                enumerable: true
              });
              return true;
            }
          } catch (e) {
            console.warn('Failed to apply shim to ' + name + ':', e);
          }
          return false;
        }

        // Try applying to window first, then Window.prototype
        if (!applyShim(window, 'fetch')) {
          applyShim(Window.prototype, 'fetch');
        }

        // Also global JSON.parse safety for "undefined"
        var originalParse = JSON.parse;
        JSON.parse = function(text, reviver) {
          if (text === "undefined" || text === undefined) {
            console.warn('JSON.parse called with "undefined". Returning null to prevent crash. Stack:', new Error().stack);
            return null;
          }
          try {
            return originalParse.apply(JSON, arguments);
          } catch (e) {
            console.error('JSON.parse failed for:', text, 'Error:', e, 'Stack:', new Error().stack);
            throw e;
          }
        };
      })();
    </script>
